version: "3.1"

intents:
  - saludo
  - despedida
  - pedir_ayuda
  - aprender_vocabulario
  - iniciar_cuento
  - responder_actividad
  - pedir_traduccion
  - pedir_repeticion
  - confirmacion
  - negacion
  - expresar_emocion
  - agradecer
  - continuar
  - pausar
  - out_of_scope
  - ver_mi_progreso
  - seleccionar_modo

entities:
  - palabra_objetivo
  - modo
  - cuento_actual

slots:
  flujo_actual:
    type: categorical
    values:
      - vocabulario
      - cuento
      - ninguno
    initial_value: ninguno
    influence_conversation: true
    mappings:
      - type: custom

  palabra_actual:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  categoria_actual:
    type: categorical
    values:
      - naturaleza
      - animales
      - cuerpo
      - colores
      - objetos
    influence_conversation: false
    mappings:
      - type: custom

  fragmento_actual:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: custom

  ultima_respuesta_bot:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  intentos_palabra:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: custom

  cuento_actual:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: cuento_actual
      - type: custom

  # Dirección de la práctica de vocabulario:
  #   es_a_shp -> se muestra la palabra en español, el alumno responde en shipibo (producción)
  #   shp_a_es -> se muestra la palabra en shipibo, el alumno responde en español (reconocimiento)
  # Persiste entre actividades hasta que el usuario elija cambiarlo.
  modo_practica:
    type: categorical
    values:
      - es_a_shp
      - shp_a_es
    initial_value: es_a_shp
    influence_conversation: false
    mappings:
      - type: custom

  respuesta_actividad:
    type: text
    influence_conversation: false
    mappings:
      - type: from_text
        not_intent:
          - iniciar_cuento
          - aprender_vocabulario
        conditions:
          - active_loop: actividad_form
            requested_slot: respuesta_actividad

forms:
  actividad_form:
    required_slots:
      - respuesta_actividad

responses:
  utter_saludo:
    - text: "¡Hola! Soy tu asistente para aprender shipibo-konibo. 🌿"

  utter_ofrecer_opciones:
    - text: "Puedes elegir una actividad: escribir **aprender vocabulario** o **quiero un cuento**."

  utter_despedida:
    - text: "¡Hasta pronto! Sigue practicando shipibo. 🌟"

  utter_agradecimiento:
    - text: "¡De nada! 🙂 Estoy aquí para apoyarte."

  utter_ayuda_general:
    - text: "Puedo ayudarte con dos actividades: vocabulario o cuento interactivo. Escribe **aprender vocabulario** o **quiero un cuento**."

  utter_redirigir_educativo:
    - text: "Por ahora puedo ayudarte con vocabulario shipibo-konibo o con un cuento interactivo."

  utter_pausar:
    - text: "Está bien, hacemos una pausa. Para iniciar otra actividad desde cero, escribe **/restart** y luego elige vocabulario o cuento."

  utter_empatia:
    - text: "Te entiendo. Aprender un idioma toma tiempo; vamos paso a paso. 🌱"

  utter_default:
    - text: "Disculpa, no entendí del todo. Puedes escribir **aprender vocabulario** o **quiero un cuento**."

  utter_ask_respuesta_actividad:
    - text: "Escribe tu respuesta."

  utter_ofrecer_modo_practica:
    - text: "¿Cómo prefieres practicar? Puedes cambiar de modo cuando quieras."

  utter_ayuda_en_actividad:
    - text: "Te doy una pista y seguimos con la misma palabra."

actions:
  - action_iniciar_vocabulario
  - action_siguiente_palabra
  - action_evaluar_respuesta_vocab
  - action_dar_pista_vocab
  - action_repetir_ultima_palabra
  - action_iniciar_cuento
  - action_siguiente_fragmento
  - action_evaluar_respuesta_cuento
  - action_dar_ayuda_cuento
  - action_repetir_fragmento
  - action_continuar_cuento
  - action_traducir
  - action_ver_progreso
  - action_seleccionar_modo
  - validate_actividad_form

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false
