# responder_actividad: el intent dispara la acción de evaluación.
# La acción lee el texto crudo (tracker.latest_message['text']) y lo
# procesa con los módulos de evaluación/traducción.
- intent: responder_actividad
  examples: |
    - agua
    - pez
    - mano
    - fuego
    - azul
    - mujer
    - casa
    - sol
    - árbol
    - jene
    - meken
    - chonkon
    - yapa
