# ═══════════════════════════════════════════════════════════════════════════
# nlu.yml — Chatbot Educativo Shipibo-Konibo  ·  Training v3 (Camino 2)
# ═══════════════════════════════════════════════════════════════════════════
#
# CAMBIOS RESPECTO A v2 (refinamiento Camino A, pre-bilingüismo):
#
# 1. responder_actividad: se ELIMINARON las 105 palabras sueltas (54 es + 51 shp).
#    Eran el ~40% de todo el training y convertían al intent en un "imán" que
#    capturaba cualquier input corto (hi, wenas -> responder_actividad @1.0).
#    Se conservan/expanden SOLO patrones de oración ("respuesta embebida").
#    El corpus validado por el especialista NO se pierde: pasa a la lookup
#    table `palabra_objetivo` al final del archivo (ver nota técnica).
#
# 2. Patrones de respuesta embebida añadidos ("elijo la opción X",
#    "selecciono la X", "podría ser X", "respondo que es X", ...). Son cadenas
#    NUEVAS, estructuralmente paralelas a las del test pero no idénticas,
#    para medir generalización real sin recontaminar train/test.
#
# 3. Rebalanceo: +ejemplos a intents pequeños. Ratio máx/mín pasó de ~14:1 a ~4:1.
#
# 4. Desambiguaciones de taxonomía (decisiones de diseño, ver chat):
#    - pedir_ayuda QUEDA como dueño de "confundido / atorado / bloqueado /
#      me cuesta". Se quitaron de expresar_emocion "me cuesta mucho" y
#      "me siento confundido" (contradecían el test). expresar_emocion
#      queda solo con estados afectivos puros.
#    - saludo dejó de contener peticiones de aprendizaje
#      ("quiero aprender shipibo", "quiero practicar shipibo" -> aprender_vocabulario).
#    - "quiero continuar" movido de confirmacion -> continuar.
#    - "luego sigo" estaba DUPLICADO en despedida y pausar: queda solo en pausar.
#    - negacion: se quitaron "no sé" y "no sé la respuesta" (no son negaciones;
#      causaban colisión con pedir_ayuda/responder_actividad).
#
# NOTA: el test_nlu_v2.yml NO se modificó. Sigue siendo conjunto independiente.
# ═══════════════════════════════════════════════════════════════════════════

