# ═══════════════════════════════════════════════════════════════════════════
# LOOKUP TABLE — corpus léxico validado por especialista lingüístico
# ═══════════════════════════════════════════════════════════════════════════
# Estas palabras YA NO son ejemplos del intent responder_actividad (causaban
# el efecto imán). Quedan aquí como entidad `palabra_objetivo` para que la
# acción de evaluación las reconozca durante una actividad.
#
# REQUISITO DE CONFIG (config.yml): el pipeline debe incluir
# `RegexEntityExtractor` (y `RegexFeaturizer`) para que la lookup table se use.
#   - name: RegexEntityExtractor
#     use_lookup_tables: true
# Si el pipeline no lo incluye, la lookup table simplemente se ignora.
