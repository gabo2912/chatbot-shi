# ═══════════════════════════════════════════════════════════════════════════
# nlu.yml — Chatbot Educativo Shipibo-Konibo  ·  Training v4
# ═══════════════════════════════════════════════════════════════════════════
#
# CAMBIOS v4 (sobre v3 / Camino 2):
#
# 1. LOOKUP `palabra_objetivo` REGENERADA desde palabras.xlsx.
#    En v3 solo 24/51 formas shipibo coincidían con el vocabulario validado;
#    el resto venía de una fuente ortográfica anterior (oshi/oshe, wero/bero,
#    seta/sheta, josho/osho, jihui/jiwi, hene/onpax, etc.) o no correspondía a
#    ninguna entrada (wischni, hiso, humti, singa, pon, sankon, ...).
#    Ahora la lookup se deriva 1:1 de palabras.xlsx (89 términos es + 85 shp),
#    misma grafía que usa la evaluación en actions.py. Si se actualiza
#    palabras.xlsx, regenerar esta sección desde la misma fuente.
#
# 2. INTENTS añadidos para cerrar el dominio: aprender_palabras,
#    ofrecer_modo_vocab y palabras_clave_cuento. Estaban declarados en
#    domain.yml y usados en rules.yml pero sin ejemplos, lo que provocaba
#    warning en `rasa data validate`. Son intents DISPARADOS PRINCIPALMENTE
#    POR PAYLOAD (botones del frontend: /aprender_palabras, etc.). Los ejemplos
#    son mínimos y de firma léxica distintiva, a propósito, para no colisionar
#    con continuar / aprender_vocabulario / iniciar_cuento.
#
# 3. `conversar` ampliado (de ~7 a ~18 ejemplos): era el intent de todo el
#    tercer módulo y estaba subdimensionado frente a pedir_ayuda.
#
# 4. `seleccionar_modo`: se ANOTÓ la entidad modo_practica en los ejemplos
#    direccionales ("español a shipibo" -> es_a_shp, "shipibo a español" ->
#    shp_a_es), para que el cambio de dirección funcione también por texto
#    libre y no solo por payload. Los ejemplos ambiguos ("modo español") y los
#    de toggle quedan sin anotar para que la acción decida.
#
# Decisiones de v3 conservadas: responder_actividad sin tokens sueltos (anti
# "imán"), taxonomía de pedir_ayuda como dueño de "atascado/confundido",
# saludo sin peticiones de aprendizaje, negacion sin "no sé". test_nlu NO se
# modificó.
#
# REQUISITO DE CONFIG (config.yml): para que la lookup se use, el pipeline debe
# incluir RegexFeaturizer y RegexEntityExtractor con use_lookup_tables: true.
# ═══════════════════════════════════════════════════════════════════════════

