# ───────────────────────────────────────────────────────────────────────────
# responder_actividad: dispara la acción de evaluación.
#
# CAMBIO v3 (Camino 2): se eliminaron las 105 palabras sueltas del corpus.
# Un intent compuesto mayoritariamente por tokens aislados se vuelve un imán
# que captura cualquier input corto. El intent ahora aprende SOLO la ESTRUCTURA
# del acto de responder ("creo que es X", "elijo la opción Y", ...).
#
# El corpus léxico validado por el especialista lingüístico se conserva en la
# lookup table `palabra_objetivo` (final del archivo) para extracción de
# entidad. La acción de evaluación sigue leyendo tracker.latest_message['text'].
#
# COMPLEMENTO REQUERIDO (fuera de este archivo): durante una actividad activa,
# mapear el slot de respuesta con `from_text` en el form, para que una respuesta
# de UNA palabra (p. ej. "jene") no dependa de la clasificación de intent.
# ───────────────────────────────────────────────────────────────────────────
- intent: responder_actividad
  examples: |
    - sí conozco la palabra
    - creo que es agua
    - es el agua
    - es jene
    - mi respuesta es jene
    - pienso que es pez
    - probablemente sea casa
    - es mano en shipibo
    - la respuesta es jene
    # --- v3: patrones de respuesta embebida (estructura "respuesta dentro de frase")
    - creo que la respuesta es agua
    - pienso que la respuesta es el sol
    - mi respuesta sería la casa
    - diría que es el río
    - yo respondo perro
    - contestaría gato
    - elijo la opción a
    - escojo la opción c
    - marco la opción b
    - voy a elegir la a
    - selecciono la opción a
    - mi elección es la b
    - podría ser bari
    - quizás sea la nube
    - a lo mejor es el pez
    - voy con la palabra mono
    - digo que es el ave
    - la palabra que elijo es casa
    - mi opción es la c
    - pongo la opción b
    - respondo con árbol
    - creo que es la luna
    - estoy seguro de que es jene
    - respondo que es agua
    - para mí es el sol
    - seguramente es la casa
    - mi respuesta final es pez
