version: "3.1"

stories:
  # Historias mínimas para no contradecir las reglas.
  # Los flujos principales se gobiernan desde rules.yml.

  - story: saludo_y_ayuda_general
    steps:
      - intent: saludo
      - action: utter_saludo
      - action: utter_ofrecer_opciones
      - intent: pedir_ayuda
      - action: utter_ayuda_general

  - story: cuento_basico
    steps:
      - intent: iniciar_cuento
      - action: action_iniciar_cuento
      - slot_was_set:
          - flujo_actual: cuento
      - intent: continuar
      - action: action_siguiente_fragmento

  - story: cuento_respuesta_basica
    steps:
      - intent: iniciar_cuento
      - action: action_iniciar_cuento
      - slot_was_set:
          - flujo_actual: cuento
      - intent: responder_actividad
      - action: action_evaluar_respuesta_cuento
