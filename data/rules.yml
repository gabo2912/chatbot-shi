version: "3.1"

rules:
  # ─────────────────────────────────────────────
  # Reglas globales simples: solo se activan si NO hay form activo
  # ─────────────────────────────────────────────
  - rule: Saludar y ofrecer opciones
    condition:
      - active_loop: null
    steps:
      - intent: saludo
      - action: utter_saludo
      - action: utter_ofrecer_opciones

  - rule: Despedirse
    condition:
      - active_loop: null
    steps:
      - intent: despedida
      - action: utter_despedida

  - rule: Agradecer
    condition:
      - active_loop: null
    steps:
      - intent: agradecer
      - action: utter_agradecimiento

  - rule: Pausar fuera de actividad
    condition:
      - active_loop: null
    steps:
      - intent: pausar
      - action: utter_pausar

  - rule: Ayuda general fuera de actividad
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: ninguno
    steps:
      - intent: pedir_ayuda
      - action: utter_ayuda_general

  - rule: Traduccion fuera de actividad
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: ninguno
    steps:
      - intent: pedir_traduccion
      - action: action_traducir

  - rule: Fuera de tema sin flujo activo
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: ninguno
    steps:
      - intent: out_of_scope
      - action: utter_redirigir_educativo

  # ─────────────────────────────────────────────
  # Flujo básico 1: vocabulario
  # ─────────────────────────────────────────────
  - rule: Iniciar vocabulario desde estado libre
    # La activación del form se hace DESDE la acción (FollowupAction) cuando
    # ya hay un modo de práctica elegido. Si es la primera vez del usuario,
    # la acción muestra el selector de modo y NO activa el form todavía.
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: ninguno
    steps:
      - intent: aprender_vocabulario
      - action: action_iniciar_vocabulario

  - rule: Evaluar respuesta de vocabulario al cerrar form
    condition:
      - active_loop: actividad_form
      - slot_was_set:
          - flujo_actual: vocabulario
    steps:
      - action: actividad_form
      - active_loop: null
      - action: action_evaluar_respuesta_vocab

  - rule: Evaluar respuesta de cuento al cerrar form
    condition:
      - active_loop: actividad_form
      - slot_was_set:
          - flujo_actual: cuento
    steps:
      - action: actividad_form
      - active_loop: null
      - action: action_evaluar_respuesta_cuento

  - rule: Siguiente palabra de vocabulario
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: vocabulario
    steps:
      - intent: continuar
      - action: action_siguiente_palabra
      - action: actividad_form
      - active_loop: actividad_form

  - rule: Pista de vocabulario fuera del form
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: vocabulario
    steps:
      - intent: pedir_ayuda
      - action: action_dar_pista_vocab
      - action: actividad_form
      - active_loop: actividad_form

  - rule: Repetir vocabulario fuera del form
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: vocabulario
    steps:
      - intent: pedir_repeticion
      - action: action_repetir_ultima_palabra
      - action: actividad_form
      - active_loop: actividad_form

  - rule: Pausar vocabulario fuera del form
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: vocabulario
    steps:
      - intent: pausar
      - action: utter_pausar

  # ─────────────────────────────────────────────
  # Flujo básico 2: cuento interactivo
  # Se inicia solo desde estado libre. No hay cambio automático desde vocabulario.
  # ─────────────────────────────────────────────
  - rule: Iniciar cuento desde estado libre
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: ninguno
    steps:
      - intent: iniciar_cuento
      - action: action_iniciar_cuento
      - slot_was_set:
          - flujo_actual: cuento

  - rule: Responder pregunta del cuento
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: cuento
    steps:
      - intent: responder_actividad
      - action: action_evaluar_respuesta_cuento

  - rule: Continuar cuento
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: cuento
    steps:
      - intent: continuar
      - action: action_siguiente_fragmento

  - rule: Pedir ayuda en cuento
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: cuento
    steps:
      - intent: pedir_ayuda
      - action: action_dar_ayuda_cuento

  - rule: Repetir fragmento en cuento
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: cuento
    steps:
      - intent: pedir_repeticion
      - action: action_repetir_fragmento

  - rule: Pausar cuento
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: cuento
    steps:
      - intent: pausar
      - action: utter_pausar

  # ─────────────────────────────────────────────
  # Ver mi progreso (panel "Mi Aprendizaje")
  # Se dispara con el payload /ver_mi_progreso desde el frontend
  # o si el usuario escribe la frase y se clasifica como out_of_scope.
  # ─────────────────────────────────────────────
  - rule: Ver progreso del usuario
    condition:
      - active_loop: null
    steps:
      - intent: ver_mi_progreso
      - action: action_ver_progreso

  # ─────────────────────────────────────────────
  # Cambio de modo de práctica (ES->SHP / SHP->ES)
  # Solo se aplica fuera de form. Dentro del form, la captura del
  # intent la hace ValidateActividadForm, que muestra el selector
  # sin cerrar la actividad.
  # ─────────────────────────────────────────────
# ─────────────────────────────────────────────
  # Modo conversación libre (tercer apartado)
  # El frontend envía cada mensaje del usuario como payload explícito
  # /conversar{"texto_usuario":"..."}. La acción procesa el texto y
  # decide: traducir palabra del corpus, responder frase conversacional,
  # buscar en RAG (futuro), o sugerir.
  # ─────────────────────────────────────────────
  - rule: Responder conversación libre
    condition:
      - active_loop: null
    steps:
      - intent: conversar
      - action: action_responder_conversacion

  # Salidas explícitas del modo conversar hacia las otras actividades.
  # Necesarias porque las reglas "Iniciar ... desde estado libre" piden
  # flujo_actual: ninguno, y dentro de conversar el slot vale "conversar".
  # Sin estas reglas, los payloads /aprender_vocabulario y /iniciar_cuento
  # quedaban atrapados por la regla "Responder conversación libre".
  - rule: Salir de conversar hacia vocabulario
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: conversar
    steps:
      - intent: aprender_vocabulario
      - action: action_iniciar_vocabulario

  - rule: Salir de conversar hacia cuento
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: conversar
    steps:
      - intent: iniciar_cuento
      - action: action_iniciar_cuento
      - slot_was_set:
          - flujo_actual: cuento

  # Cambio de modo durante una actividad: cerrar el form,
  # delegar a action_seleccionar_modo (que aplica el modo y reactiva
  # el form vía FollowupAction).
  - rule: Cambiar modo durante actividad
    condition:
      - active_loop: actividad_form
    steps:
      - intent: seleccionar_modo
      - action: action_deactivate_loop
      - active_loop: null
      - action: action_seleccionar_modo

  - rule: Seleccionar modo de práctica fuera de actividad
    condition:
      - active_loop: null
    steps:
      - intent: seleccionar_modo
      - action: action_seleccionar_modo
  - rule: Recorrer palabras en modo aprender
    condition:
      - active_loop: null
    steps:
      - intent: aprender_palabras
      - action: action_aprender_vocabulario

  - rule: Ofrecer aprender o evaluar al entrar a una categoria
    condition:
      - active_loop: null
    steps:
      - intent: ofrecer_modo_vocab
      - action: action_ofrecer_modo_vocab

  - rule: Evaluarme desde el submodo aprender (flujo ya en vocabulario)
    condition:
      - active_loop: null
      - slot_was_set:
          - flujo_actual: vocabulario
    steps:
      - intent: aprender_vocabulario
      - action: action_iniciar_vocabulario

  - rule: Mostrar palabras clave antes del cuento
    condition:
      - active_loop: null
    steps:
      - intent: palabras_clave_cuento
      - action: action_palabras_clave_cuento

  - rule: Comenzar cuento tras ver palabras clave (cualquier flujo libre)
    condition:
      - active_loop: null
    steps:
      - intent: iniciar_cuento
      - action: action_iniciar_cuento